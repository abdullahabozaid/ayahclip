x-logging: &default-logging
  driver: json-file
  options:
    max-size: "20m"
    max-file: "3"

services:
  frontend:
    container_name: ayahclip-frontend
    logging: *default-logging
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://ayahclip.com}
        NEXT_PUBLIC_ASR_MODEL_URL: ${NEXT_PUBLIC_ASR_MODEL_URL:-/models/fastconformer_ar_ctc_q8.onnx}
        DEPLOYMENT_VERSION: ${DEPLOYMENT_VERSION:-local}
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://ayahclip.com}
      # Public deployment: browser-storage only. The disk-backed library and
      # save-export routes stay OFF (deny by default) regardless of forged
      # X-Forwarded-* / Origin headers, which a co-tenant on the shared Docker
      # network could otherwise use to reach these routes past Caddy.
      AYAHCLIP_ENABLE_DISK_LIBRARY: "0"
      # NOTE: currently unread by application code; kept only for compatibility.
      AYAHCLIP_SELF_HOSTED: "1"
      DEPLOYMENT_VERSION: ${DEPLOYMENT_VERSION:-local}
      PORT: "3000"
    expose:
      - "3000"
    restart: unless-stopped
    mem_limit: 2g
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s
    networks:
      - default
      - public_caddy

networks:
  public_caddy:
    external: true
    name: ${CADDY_NETWORK:-caddy}
