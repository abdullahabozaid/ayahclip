name: AyahClip
options:
  bundleIdPrefix: app.ayahclip
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.0"
settings:
  base:
    DEVELOPMENT_TEAM: PUV357QJL4
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    CODE_SIGN_STYLE: Automatic
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
targets:
  AyahClip:
    type: application
    platform: iOS
    sources:
      - path: AyahClip
      - path: ../public/fonts/UthmanicHafs1Ver18.ttf
        buildPhase: resources
    info:
      path: AyahClip/Resources/Info.plist
      properties:
        CFBundleDisplayName: AyahClip
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen:
          UIColorName: LaunchBackground
        UIAppFonts:
          - UthmanicHafs1Ver18.ttf
        NSPhotoLibraryUsageDescription: AyahClip lets you select videos and audio you own to create Quran clips.
        NSPhotoLibraryAddUsageDescription: AyahClip saves finished clips to your photo library only when you ask.
        LSSupportsOpeningDocumentsInPlace: true
        CFBundleDocumentTypes:
          - CFBundleTypeName: Video
            CFBundleTypeRole: Editor
            LSHandlerRank: Owner
            LSItemContentTypes:
              - public.movie
              - public.video
              - public.audio
        CFBundleURLTypes:
          - CFBundleURLName: app.ayahclip.mobile
            CFBundleURLSchemes:
              - ayahclip
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiresFullScreen: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.ayahclip.mobile
        PRODUCT_NAME: AyahClip
        CODE_SIGN_ENTITLEMENTS: AyahClip/Resources/AyahClip.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    dependencies:
      - target: AyahClipShare
    scheme:
      testTargets:
        - AyahClipTests
        - AyahClipUITests
  AyahClipTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: AyahClipTests
    dependencies:
      - target: AyahClip
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.ayahclip.mobile.tests
        GENERATE_INFOPLIST_FILE: true
  AyahClipUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: AyahClipUITests
    dependencies:
      - target: AyahClip
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.ayahclip.mobile.uitests
        GENERATE_INFOPLIST_FILE: true
  AyahClipShare:
    type: app-extension
    platform: iOS
    sources:
      - path: AyahClipShare
    info:
      path: AyahClipShare/Info.plist
      properties:
        CFBundleDisplayName: Import to AyahClip
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsText: true
              NSExtensionActivationSupportsMovieWithMaxCount: 1
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.ayahclip.mobile.share
        PRODUCT_NAME: AyahClipShare
        CODE_SIGN_ENTITLEMENTS: AyahClipShare/AyahClipShare.entitlements
        SKIP_INSTALL: true
